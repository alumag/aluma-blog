name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Run action
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.3

      - name: Use Node.js lts
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔍 Type Check
        run: pnpm run type-check

      - name: 🧹 Lint
        run: pnpm run lint

      - name: 💄 Formatting
        run: pnpm run format
